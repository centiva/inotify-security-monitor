# ==========================================
# Inotify Security Monitor Configuration
# ==========================================


# Email destination
EMAIL="p.sigkiridis@centiva.gr"


# Host identifier
HOSTNAME="$(hostname)"


# Logging
LOG_FILE="./logs/inotify-security-monitor.log"

# Event queue
QUEUE_FILE="./logs/inotify-security-monitor.queue"


# Archive directory
ARCHIVE_DIR="/var/lib/inotify-security-monitor/archive"


# Directories to monitor.
# Modify these paths to match your server.
WATCH_DIRS=(
    "/home/cortel/domains/cortel.gr/public_html"
)

########################################
# Additional directories to exclude
########################################

EXCLUDE_DIRS=(
    "/home/cortel/domains/cortel.gr/public_html/cache"
    "/home/cortel/domains/cortel.gr/public_html/tmp"
)

########################################
# Directory wildcard exclusions
########################################

EXCLUDE_DIR_PATTERNS=(
    "*/bfnetwork/*"
    "*/cache/*"
    "*/vendor/*"
    "*/.sass-cache/*"
    "*/scss-cache/*"
)


########################################
# File wildcard exclusions
########################################

EXCLUDE_FILE_PATTERNS=(
    "*.scss.cache"
)


########################################
# Full path wildcard exclusions
########################################

EXCLUDE_PATH_PATTERNS=(
)

########################################
# Additional files to exclude
########################################

EXCLUDE_FILES=(
)

########################################
# Additional extensions to exclude
########################################

EXCLUDE_EXTENSIONS=(
)

# Logging
LOG_FILE="./logs/inotify-security-monitor.log"
QUEUE_FILE="./logs/inotify-security-monitor.queue"


# Summary Engine
SUMMARY_INTERVAL=60


# Email Notifications
EMAIL_ENABLED=true
EMAIL_TO="p.sigkiridis@centiva.gr"


# SMTP Settings
SMTP_SERVER="localhost"
SMTP_PORT=25

# Rate Limiting
MAX_EMAILS_PER_HOUR=10
EMAIL_COUNTER_FILE="./logs/email-counter"


# Log Rotation
MAX_LOG_SIZE_MB=50
LOG_RETENTION_DAYS=30


# Monitored extensions
WATCH_EXTENSIONS=(
"php"
"phtml"
"phar"
"cgi"
"pl"
"py"
"sh"
"js"
)


# Enable features

ENABLE_EMAIL="yes"

ENABLE_HASH="yes"

ENABLE_ARCHIVE="yes"


# Summary interval

SUMMARY_INTERVAL=60


# Email limits

MAX_EMAILS_PER_MINUTE=10


########################################
# Notification Policy
########################################

# Events that are eligible for email notifications.
# Events not listed here are still logged.

EMAIL_EVENTS=(
    "CREATE"
    "MODIFY"
    "DELETE"
    "MOVED_TO"
)

# File extensions eligible for email notifications.
# Extensions are case-insensitive.

EMAIL_EXTENSIONS=(
    "php"
    "phtml"
    "phar"
    "cgi"
    "pl"
    "py"
    "sh"
)

# Critical filenames always generate an email,
# regardless of extension filtering.

EMAIL_CRITICAL_FILES=(
    "wp-config.php"
    "configuration.php"
    ".htaccess"
    ".user.ini"
    "composer.json"
    "composer.lock"
)

EMAIL_ALWAYS_CRITICAL="yes"
