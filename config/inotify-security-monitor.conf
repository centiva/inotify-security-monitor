# ==========================================
# Inotify Security Monitor Configuration
# ==========================================


# Email destination
EMAIL="p.sigkiridis@centiva.gr"


# Host identifier
HOSTNAME="$(hostname)"


# Logging
LOG_FILE="/var/log/inotify-security-monitor.log"


# Event queue
QUEUE_FILE="/var/log/inotify-security-monitor.queue"


# Archive directory
ARCHIVE_DIR="/var/lib/inotify-security-monitor/archive"


# Watched directories
WATCH_DIRS=(
"/var/www/html"
)


# Monitored extensions
WATCH_EXTENSIONS=(
"php"
"phtml"
"phar"
"cgi"
"pl"
"py"
"sh"
"js"
)


# Enable features

ENABLE_EMAIL="yes"

ENABLE_HASH="yes"

ENABLE_ARCHIVE="yes"


# Summary interval

SUMMARY_INTERVAL=60


# Email limits

MAX_EMAILS_PER_MINUTE=10