name: Shell CI

on:
  push:
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: ShellCheck
        run: shellcheck -x scripts/*.sh installer/*.sh tests/*.sh

      - name: Bash syntax
        run: |
          for file in scripts/*.sh installer/*.sh tests/*.sh; do
            bash -n "$file"
          done

      - name: Check formatting
        run: shfmt -d scripts installer tests